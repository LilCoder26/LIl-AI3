<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Lil' AI Chatbot</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; font-family: system-ui, sans-serif; }
    body { background: #0f172a; color: #e5e7eb; display: flex; justify-content: center; align-items: center; min-height: 100vh; padding: 16px; }
    .chat-container { background: #020617; border-radius: 16px; border: 1px solid #1f2937; width: 100%; max-width: 800px; height: 80vh; display: flex; flex-direction: column; overflow: hidden; }
    .chat-header { padding: 16px 20px; border-bottom: 1px solid #1f2937; display: flex; align-items: center; gap: 10px; }
    .chat-header-icon { width: 32px; height: 32px; border-radius: 999px; background: radial-gradient(circle at 30% 30%, #22c55e, #0ea5e9 40%, #4f46e5 80%); }
    .chat-header-title { font-weight: 600; font-size: 16px; }
    .chat-header-subtitle { font-size: 12px; color: #9ca3af; }
    .chat-messages { flex: 1; padding: 16px 20px; overflow-y: auto; display: flex; flex-direction: column; gap: 12px; }
    .message { max-width: 80%; padding: 10px 12px; border-radius: 12px; font-size: 14px; line-height: 1.4; white-space: pre-wrap; }
    .message.user { align-self: flex-end; background: #1d4ed8; border-bottom-right-radius: 4px; }
    .message.bot { align-self: flex-start; background: #020617; border: 1px solid #1f2937; border-bottom-left-radius: 4px; }
    .message.system { align-self: center; color: #6b7280; font-size: 12px; }
    .chat-input-area { border-top: 1px solid #1f2937; padding: 10px 12px; display: flex; gap: 8px; background: #020617; }
    .chat-input { flex: 1; resize: none; border-radius: 999px; border: 1px solid #374151; padding: 10px 14px; background: #020617; color: #e5e7eb; }
    .send-button { border-radius: 999px; border: none; padding: 10px 16px; background: linear-gradient(135deg, #22c55e, #0ea5e9); color: #020617; cursor: pointer; }
    .typing-indicator { font-size: 12px; color: #9ca3af; padding: 0 20px 8px; }
  </style>
</head>
<body>

  <div class="chat-container">
    <header class="chat-header">
      <div class="chat-header-icon"></div>
      <div>
        <div class="chat-header-title">Lil' AI</div>
        <div class="chat-header-subtitle">AI connected with Groq</div>
      </div>
    </header>

    <main class="chat-messages" id="chatMessages">
      <div class="message system">Lil' AI is ready!</div>
      <div class="message bot">Hey! I'm Lil' AI. I'm waiting for my brain to be plugged in.</div>
    </main>

    <div class="typing-indicator" id="typingIndicator" style="display:none;">Lil' AI is thinking…</div>

    <form class="chat-input-area" id="chatForm">
      <textarea id="chatInput" class="chat-input" rows="1" placeholder="Type your message..."></textarea>
      <button type="submit" class="send-button">Send</button>
    </form>
  </div>

  <script>
    const chatForm = document.getElementById("chatForm");
    const chatInput = document.getElementById("chatInput");
    const chatMessages = document.getElementById("chatMessages");
    const typingIndicator = document.getElementById("typingIndicator");

    function addMessage(text, role = "bot") {
      const div = document.createElement("div");
      div.classList.add("message", role);
      div.textContent = text;
      chatMessages.appendChild(div);
      chatMessages.scrollTop = chatMessages.scrollHeight;
    }

    /* ⭐ NEW SAFE BACKEND VERSION ⭐ */
    async function customAI(userText) {
      const response = await fetch("/api/groq", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ userText })
      });

      const data = await response.json();
      return data.choices[0].message.content;
    }

    async function handleSubmit(event) {
      event.preventDefault();
      const text = chatInput.value.trim();
      if (!text) return;

      addMessage(text, "user");
      chatInput.value = "";

      typingIndicator.style.display = "block";

      try {
        const reply = await customAI(text);
        addMessage(reply, "bot");
      } catch {
        addMessage("Lil' AI couldn't connect to the server.", "bot");
      }

      typingIndicator.style.display = "none";
    }

    chatForm.addEventListener("submit", handleSubmit);
  </script>

</body>
</html>
